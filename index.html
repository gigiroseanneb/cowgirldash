<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Cowgirl Clue Dashboard</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{background:#1b2b3a;color:#f0eae0;font-family:Georgia,"Times New Roman",serif;min-height:100vh;}.app{max-width:900px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;}.lock-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:2rem;}.lock-logo{font-size:42px;font-weight:normal;font-style:normal;color:#fff;text-align:center;font-family:Georgia,"Times New Roman",serif;letter-spacing:1px;}.lock-sub{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:Georgia,"Times New Roman",serif;}.lock-input{background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-family:Georgia,"Times New Roman",serif;font-size:15px;padding:12px 20px;text-align:center;outline:none;width:240px;letter-spacing:3px;margin-top:0.5rem;}.lock-input:focus{border-color:rgba(255,150,180,0.5);}.lock-btn{background:#ff8fab;border:none;border-radius:10px;color:#1b2b3a;font-family:Georgia,"Times New Roman",serif;font-size:13px;padding:11px 36px;cursor:pointer;}.lock-btn:hover{background:#ffaac0;}.lock-err{font-size:12px;color:#ff8fab;letter-spacing:2px;min-height:16px;font-family:Georgia,"Times New Roman",serif;}.dashboard{display:none;}.dashboard.visible{display:block;}.header{text-align:center;padding:2rem 0 1.5rem;}.logo-txt{font-size:42px;font-weight:normal;font-style:normal;color:#fff;line-height:1.1;font-family:Georgia,"Times New Roman",serif;letter-spacing:1px;}.tagline{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:8px;font-family:Georgia,"Times New Roman",serif;}.tabs{display:flex;justify-content:center;border-bottom:0.5px solid rgba(255,255,255,0.12);margin-bottom:2rem;}.tab{background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,0.3);font-family:Georgia,"Times New Roman",serif;font-size:13px;letter-spacing:1px;padding:10px 28px;cursor:pointer;transition:all 0.2s;}.tab.active{color:#fff;border-bottom:2px solid #ff8fab;}.tab:hover:not(.active){color:rgba(255,255,255,0.6);}.section{display:none;}.section.active{display:block;}.sec-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:1.2rem;font-family:Georgia,"Times New Roman",serif;}.plist{display:flex;flex-direction:column;gap:1.25rem;}.pcard{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);border-radius:18px;padding:1.5rem;}.pcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid rgba(255,255,255,0.08);}.pname{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#ff8fab;font-family:Georgia,"Times New Roman",serif;}.padd{background:none;border:0.5px solid rgba(255,143,171,0.35);border-radius:6px;color:#ff8fab;font-family:Georgia,"Times New Roman",serif;font-size:11px;padding:4px 12px;cursor:pointer;}.padd:hover{background:rgba(255,143,171,0.1);}.accounts-section{margin-bottom:1.25rem;}.mini-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:0.6rem;font-family:Georgia,"Times New Roman",serif;}.acc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);}.acc-row:last-child{border-bottom:none;}.acc-handle{font-size:13px;color:#fff;font-family:Georgia,"Times New Roman",serif;}.acc-status{font-size:10px;padding:2px 8px;border-radius:4px;letter-spacing:1px;font-family:Georgia,"Times New Roman",serif;}.s-active{background:rgba(160,220,140,0.15);color:#8fd47a;}.s-paused{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);}.empty-msg{font-size:12px;color:rgba(255,255,255,0.2);font-style:italic;padding:4px 0;font-family:Georgia,"Times New Roman",serif;}.notes-section{border-top:0.5px solid rgba(255,255,255,0.08);padding-top:1.1rem;}.note-feed{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.9rem;}.note-entry{background:rgba(255,255,255,0.05);border-radius:10px;padding:0.75rem;font-size:13px;color:#fff;line-height:1.6;font-family:Georgia,"Times New Roman",serif;}.note-entry img{max-width:100%;border-radius:8px;margin-top:0.5rem;display:block;}.note-add{display:flex;flex-direction:column;gap:0.5rem;}textarea.note-ta{width:100%;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-family:Georgia,"Times New Roman",serif;font-size:13px;line-height:1.6;resize:none;outline:none;padding:9px 12px;min-height:64px;}textarea.note-ta::placeholder{color:rgba(255,255,255,0.18);font-style:italic;}textarea.note-ta:focus{border-color:rgba(255,143,171,0.4);}.note-btns{display:flex;align-items:center;gap:0.5rem;}.img-lbl{background:none;border:0.5px solid rgba(255,255,255,0.15);border-radius:7px;color:rgba(255,255,255,0.4);font-family:Georgia,"Times New Roman",serif;font-size:11px;padding:6px 14px;cursor:pointer;}.img-lbl:hover{border-color:rgba(255,143,171,0.4);color:#ff8fab;}.post-btn{background:#ff8fab;border:none;border-radius:7px;color:#1b2b3a;font-family:Georgia,"Times New Roman",serif;font-size:11px;padding:6px 18px;cursor:pointer;}.post-btn:hover{background:#ffaac0;}.note-img-pre{max-width:100px;border-radius:7px;display:none;margin-top:2px;}.shows-list{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem;}.show-card{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.12);border-radius:16px;padding:1.25rem;}.show-top{display:grid;grid-template-columns:64px 1fr auto;gap:1rem;align-items:center;}.date-blk{text-align:center;}.d-mon{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#ff8fab;font-family:Georgia,"Times New Roman",serif;}.d-day{font-size:30px;line-height:1;color:#fff;font-family:Georgia,"Times New Roman",serif;}.sv{font-size:13px;color:#fff;margin-bottom:3px;font-family:Georgia,"Times New Roman",serif;}.sc{font-size:11px;color:rgba(255,255,255,0.4);font-family:Georgia,"Times New Roman",serif;}.badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:5px;white-space:nowrap;font-family:Georgia,"Times New Roman",serif;}.b-up{background:rgba(255,143,171,0.15);color:#ff8fab;}.b-so{background:rgba(240,100,100,0.15);color:#f08080;}.show-img{max-width:100%;border-radius:10px;margin-top:0.75rem;display:block;}.add-btn{width:100%;background:none;border:0.5px dashed rgba(255,255,255,0.15);border-radius:12px;color:rgba(255,255,255,0.3);font-family:Georgia,"Times New Roman",serif;font-size:12px;padding:13px;cursor:pointer;transition:all 0.2s;}.add-btn:hover{border-color:rgba(255,143,171,0.4);color:#ff8fab;}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(20,32,46,0.93);z-index:20;padding:3rem 1rem;overflow-y:auto;}.modal-overlay.open{display:block;}.modal{background:#1e3044;border:0.5px solid rgba(255,143,171,0.2);border-radius:20px;padding:2rem;max-width:400px;margin:0 auto;}.modal-title{font-size:22px;color:#fff;margin-bottom:1.5rem;font-family:Georgia,"Times New Roman",serif;}.flabel{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px;font-family:Georgia,"Times New Roman",serif;}.finput,.fselect{width:100%;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-family:Georgia,"Times New Roman",serif;font-size:13px;padding:10px 14px;margin-bottom:1.2rem;outline:none;}.finput:focus,.fselect:focus{border-color:rgba(255,143,171,0.5);}.fselect option{background:#1e3044;}.fimg-lbl{display:block;width:100%;background:rgba(255,255,255,0.04);border:0.5px dashed rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.35);font-family:Georgia,"Times New Roman",serif;font-size:12px;padding:12px;text-align:center;cursor:pointer;margin-bottom:1.2rem;}.fimg-lbl:hover{border-color:rgba(255,143,171,0.4);color:#ff8fab;}.fimg-pre{max-width:100%;border-radius:8px;margin-bottom:1rem;display:none;}.mactions{display:flex;gap:0.75rem;margin-top:0.25rem;}.mbtn{flex:1;border-radius:8px;font-family:Georgia,"Times New Roman",serif;font-size:12px;padding:11px;cursor:pointer;border:none;}.mbtn-primary{background:#ff8fab;color:#1b2b3a;}.mbtn-primary:hover{background:#ffaac0;}.mbtn-cancel{background:none;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.35);}</style></head><body><div class="app" id="app"><div class="lock-screen" id="lock-screen"><div class="lock-logo">Cowgirl Clue</div><div class="lock-sub">dashboard</div><input class="lock-input" id="pw-input" type="password" placeholder="enter password" onkeydown="if(event.key==='Enter')checkPw()"/><button class="lock-btn" onclick="checkPw()">enter</button><div class="lock-err" id="pw-err"></div></div><div class="dashboard" id="dashboard"><div class="header"><div class="logo-txt">Cowgirl Clue</div><div class="tagline">dashboard</div></div><div class="tabs"><button class="tab active" onclick="switchTab('accounts',this)">Accounts</button><button class="tab" onclick="switchTab('shows',this)">Shows</button></div><div id="tab-accounts" class="section active"><div class="sec-label">Platforms & notes</div><div class="plist" id="platform-list"></div></div><div id="tab-shows" class="section"><div class="sec-label">Upcoming shows</div><div class="shows-list" id="shows-list"></div><button class="add-btn" onclick="openModal('show-modal')">+ add show</button></div><div class="modal-overlay" id="account-modal"><div class="modal"><div class="modal-title">Add account</div><label class="flabel">Platform</label><select class="fselect" id="m-platform"><option>TikTok</option><option>Instagram</option><option>Spotify</option><option>Twitter/X</option><option>Pinterest</option></select><label class="flabel">Handle</label><input class="finput" id="m-handle" placeholder="@username"/><label class="flabel">Status</label><select class="fselect" id="m-status"><option value="active">Active</option><option value="paused">Paused</option></select><div class="mactions"><button class="mbtn mbtn-cancel" onclick="closeModals()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveAccount()">Save</button></div></div></div><div class="modal-overlay" id="show-modal"><div class="modal"><div class="modal-title">Add show</div><label class="flabel">Venue / event</label><input class="finput" id="s-venue" placeholder="Venue name"/><label class="flabel">City</label><input class="finput" id="s-city" placeholder="City, State"/><label class="flabel">Date</label><input class="finput" id="s-date" type="date"/><label class="flabel">Status</label><select class="fselect" id="s-status"><option value="upcoming">Upcoming</option><option value="sold-out">Sold out</option></select><label class="fimg-lbl" for="s-img-input">+ attach flyer or image</label><input type="file" id="s-img-input" accept="image/*" style="display:none" onchange="previewShowImg(this)"/><img class="fimg-pre" id="s-img-pre"/><div class="mactions"><button class="mbtn mbtn-cancel" onclick="closeModals()">Cancel</button><button class="mbtn mbtn-primary" onclick="saveShow()">Save</button></div></div></div></div></div><script>const PASSWORD='clue0789';const PLATFORMS=['TikTok','Instagram','Spotify','Twitter/X','Pinterest'];let accounts={TikTok:[],Instagram:[],Spotify:[],'Twitter/X':[],Pinterest:[]};let shows=[];let notes={TikTok:[],Instagram:[],Spotify:[],'Twitter/X':[],Pinterest:[]};let pendingImgs={};let showImgData=null;function checkPw(){const v=document.getElementById('pw-input').value;if(v===PASSWORD){document.getElementById('lock-screen').style.display='none';document.getElementById('dashboard').classList.add('visible');renderAll();}else{document.getElementById('pw-err').textContent='incorrect password';document.getElementById('pw-input').value='';}}function switchTab(t,el){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));el.classList.add('active');document.getElementById('tab-'+t).classList.add('active');}function openModal(id){document.getElementById(id).classList.add('open');}function closeModals(){document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('open'));showImgData=null;const pr=document.getElementById('s-img-pre');if(pr){pr.style.display='none';pr.src='';}const inp=document.getElementById('s-img-input');if(inp)inp.value='';}function key(p){return p.replace(/[^a-z0-9]/gi,'_');}function renderPlatforms(){const list=document.getElementById('platform-list');list.innerHTML=PLATFORMS.map(p=>{const k=key(p);const accs=accounts[p]||[];const accRows=accs.length?accs.map(a=>`<div class="acc-row"><span class="acc-handle">${a.handle}</span><span class="acc-status ${a.status==='active'?'s-active':'s-paused'}">${a.status}</span></div>`).join(''):`<div class="empty-msg">no accounts added yet</div>`;const noteEntries=(notes[p]||[]).map(e=>`<div class="note-entry">${e.text?`<div>${e.text}</div>`:''}${e.img?`<img src="${e.img}"/>`:''}
    </div>`).join('');return`<div class="pcard"><div class="pcard-top"><span class="pname">${p}</span><button class="padd" onclick="openAccModal('${p}')">+ add account</button></div><div class="accounts-section"><div class="mini-label">accounts</div>${accRows}</div><div class="notes-section"><div class="mini-label">notes</div><div class="note-feed" id="feed-${k}">${noteEntries||'<div class="empty-msg">no notes yet</div>'}</div><div class="note-add"><textarea class="note-ta" id="ta-${k}" placeholder="add a note for ${p}..."></textarea><div class="note-btns"><label class="img-lbl" for="ni-${k}">+ image</label><input type="file" id="ni-${k}" accept="image/*" style="display:none" onchange="onNoteImg(this,'${p}')"/><img class="note-img-pre" id="nip-${k}"/><button class="post-btn" onclick="postNote('${p}')">post</button></div></div></div></div>`;}).join('');}function openAccModal(p){document.getElementById('m-platform').value=p;openModal('account-modal');}function saveAccount(){const p=document.getElementById('m-platform').value;const h=document.getElementById('m-handle').value.trim();const s=document.getElementById('m-status').value;if(!h)return;accounts[p].push({handle:h,status:s});document.getElementById('m-handle').value='';closeModals();renderPlatforms();}function onNoteImg(input,p){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{pendingImgs[p]=e.target.result;const pr=document.getElementById('nip-'+key(p));if(pr){pr.src=e.target.result;pr.style.display='block';}};reader.readAsDataURL(file);}function postNote(p){const k=key(p);const ta=document.getElementById('ta-'+k);const text=(ta?ta.value.trim():'');const img=pendingImgs[p]||null;if(!text&&!img)return;if(!notes[p])notes[p]=[];notes[p].push({text,img});if(ta)ta.value='';pendingImgs[p]=null;renderPlatforms();}function renderShows(){const list=document.getElementById('shows-list');if(!shows.length){list.innerHTML='<div class="empty-msg" style="padding:1rem 0;">No shows added yet</div>';return;}list.innerHTML=shows.map(s=>{const d=new Date(s.date+'T12:00:00');const mon=d.toLocaleString('en',{month:'short'}).toUpperCase();const day=d.getDate();return`<div class="show-card"><div class="show-top"><div class="date-blk"><div class="d-mon">${mon}</div><div class="d-day">${day}</div></div><div><div class="sv">${s.venue}</div><div class="sc">${s.city}</div></div><span class="badge ${s.status==='sold-out'?'b-so':'b-up'}">${s.status==='sold-out'?'sold out':'upcoming'}</span></div>${s.img?`<img class="show-img" src="${s.img}"/>`:''}
    </div>`;}).join('');}function previewShowImg(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{showImgData=e.target.result;const pr=document.getElementById('s-img-pre');pr.src=showImgData;pr.style.display='block';};reader.readAsDataURL(file);}function saveShow(){const v=document.getElementById('s-venue').value.trim();const c=document.getElementById('s-city').value.trim();const d=document.getElementById('s-date').value;const st=document.getElementById('s-status').value;if(!v||!d)return;shows.push({venue:v,city:c,date:d,status:st,img:showImgData});shows.sort((a,b)=>a.date.localeCompare(b.date));['s-venue','s-city','s-date'].forEach(id=>document.getElementById(id).value='');closeModals();renderShows();}function renderAll(){renderPlatforms();renderShows();}</script></body></html>
